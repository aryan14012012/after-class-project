<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <style>
  .div1 {
    width: 100px;
    height: 100px;
    background-color: mediumseagreen;
    transition: transform 0.5s ease-in-out; /* Makes the rotation smooth */
  }

  .div1:hover {
    transform: rotate(360deg); /* Rotates 360 degrees on hover */
  }
</style>

<div class="div1">Hover Me</div>

</body>
</html>
