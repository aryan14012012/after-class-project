<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style> 
    .static{
        color: red;
        background-color: yellow;
        position: static;
        float: right;
        place-items: center;
        height: 100px;
        width: 120px;
        text-align: center;
        justify-items: center;  
        text-shadow: 4px 4px 4px black;  
        justify-content: center;}


    .relative{
        color: blue;
        background-color: lightblue;
        position: relative;
        left: 20px;
        height: 100px;
        width: 120px;
        text-align: center;
        text-shadow: 4px 4px 4px red;
    }
    #h{
        color: blue;
        text-shadow: 5px 4px 4px black;
        font-size: larger;
    }
    .absolute{
        color: white;
        background-color: rgb(218, 92, 92);
        position: absolute;
        top: 300px;
        left: 20px;
        width: 1500px;
         height: 1cm;
        text-align: center;
        text-shadow: 4px 4px 4px black; 
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; 
    font-size: larger;
font-weight: bold;
}
    .fixed{
        color: white;
        background-color: rgb(17, 111, 68);
        position: fixed;
        top: 40px;
        left: 20px;
        width: 1500px;
         height: 1cm;
        text-align: center;
        text-shadow: 4px 4px 4px black; 
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; 
        font-size: larger;
        font-weight: bold;
        ;
     }
        
     .sticky{
        color: rgb(222, 219, 38);
        background-color: rgb(64, 90, 9);
        position: sticky;
        top: 200px;
        left: 20px;
        width: 1500px;
         height: 1cm;
        text-align: center;
        text-shadow: 4px 4px 4px black; 
        font-family: 'Gill Sans', 'Gill Sans MT', Calibri, 'Trebuchet MS', sans-serif; 
        font-size: larger;
        font-weight: bold;
        float: right;
        padding: 10px;
     }
        

</style>
<body

 
  <h1 id="h">  <CENTER> ALL POSITIONING </CENTER>
</h1>
 <div class="static"><center>this is static</center></div>
 <div class="relative">this is relative</div>
 <div class="absolute">this is absolute.</div>
 <div class="fixed">this is fixed</div>
 
    <div class="sticky">this is sticky</div>



</body>
